<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能备忘录 · Smart Memo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

  <header>
    <h1><i class="fas fa-brain"></i> 智能备忘录</h1>
    <p>
      自动分类 · AI 智能 · 行程规划 · MCP 协议
      <span id="apiBadge" class="api-badge offline" style="margin-left:12px">
        <i class="fas fa-circle"></i> 检测中…
      </span>
    </p>
  </header>

  <div class="main-content">

    <!-- ── 左侧面板 ─────────────────────────────────── -->
    <aside class="sidebar">

      <div class="input-area">
        <textarea id="memoInput"
          placeholder="输入备忘内容…&#10;&#10;示例：明天上午 9 点开会讨论项目进度"
        ></textarea>

        <div class="input-row">
          <button class="btn btn-primary" id="addBtn" onclick="addMemo()">
            <i class="fas fa-plus"></i> 添加备忘录
          </button>
          <button class="btn-icon" id="voiceBtn" onclick="toggleVoiceInput()" title="语音输入">
            <i class="fas fa-microphone"></i>
          </button>
        </div>

        <div id="voiceStatus" class="voice-status">
          <i class="fas fa-circle-notch fa-spin"></i>
          <span id="voiceStatusText">正在聆听…</span>
        </div>

        <div id="categoryHint" class="category-hint">
          <span>AI 建议分类：</span>
        </div>
      </div>

      <h3><i class="fas fa-tags"></i> 分类筛选</h3>
      <ul class="category-list">
        <li class="category-item active" data-category="all"      onclick="filterByCategory('all')">
          <i class="fas fa-list"></i><span>全部</span><span class="badge">0</span>
        </li>
        <li class="category-item" data-category="work"     onclick="filterByCategory('work')">
          <i class="fas fa-briefcase"></i><span>工作</span><span class="badge">0</span>
        </li>
        <li class="category-item" data-category="life"     onclick="filterByCategory('life')">
          <i class="fas fa-home"></i><span>生活</span><span class="badge">0</span>
        </li>
        <li class="category-item" data-category="study"    onclick="filterByCategory('study')">
          <i class="fas fa-book"></i><span>学习</span><span class="badge">0</span>
        </li>
        <li class="category-item" data-category="health"   onclick="filterByCategory('health')">
          <i class="fas fa-heart"></i><span>健康</span><span class="badge">0</span>
        </li>
        <li class="category-item" data-category="shopping" onclick="filterByCategory('shopping')">
          <i class="fas fa-shopping-cart"></i><span>购物</span><span class="badge">0</span>
        </li>
        <li class="category-item" data-category="ideas"    onclick="filterByCategory('ideas')">
          <i class="fas fa-lightbulb"></i><span>想法</span><span class="badge">0</span>
        </li>
        <li class="category-item" data-category="travel"   onclick="filterByCategory('travel')">
          <i class="fas fa-plane"></i><span>出行</span><span class="badge">0</span>
        </li>
        <li class="category-item" data-category="other"    onclick="filterByCategory('other')">
          <i class="fas fa-tag"></i><span>其他</span><span class="badge">0</span>
        </li>
      </ul>

    </aside>

    <!-- ── 右侧主区 ─────────────────────────────────── -->
    <main class="content">

      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="搜索备忘录…">
        <button class="btn" style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff"
                onclick="document.getElementById('searchInput').dispatchEvent(new Event('input'))">
          <i class="fas fa-search"></i>
        </button>
      </div>

      <div class="stats">
        <div class="stat-card"><h3 id="totalCount">0</h3><p>总备忘录</p></div>
        <div class="stat-card"><h3 id="scheduleCount">0</h3><p>今日行程</p></div>
        <div class="stat-card"><h3 id="catCount">0</h3><p>分类数量</p></div>
      </div>

      <div class="memo-list" id="memoList">
        <div class="empty-state">
          <i class="fas fa-clipboard-list"></i>
          <p>还没有备忘录</p>
          <p>在左侧输入框中添加第一条备忘吧！</p>
        </div>
      </div>

    </main>
  </div>

  <!-- ── 行程模块 ──────────────────────────────────── -->
  <div class="schedule-container">
    <div class="schedule-header">
      <h2><i class="fas fa-calendar-alt"></i> 每日行程安排</h2>
      <div class="schedule-controls">
        <input type="date" id="scheduleDate">
        <button class="btn-schedule" id="genBtn" onclick="generateSchedule()">
          <i class="fas fa-magic"></i> 生成行程
        </button>
        <button class="btn-schedule btn-broadcast" onclick="toggleBroadcast()">
          <i class="fas fa-volume-up"></i> 播报行程
        </button>
      </div>
    </div>

    <!-- 播报控制面板 -->
    <div class="broadcast-panel" id="broadcastPanel">
      <div class="broadcast-top">
        <h4><i class="fas fa-volume-up"></i> 行程播报中</h4>
        <div style="display:flex;gap:12px;align-items:center;font-size:.83rem">
          语速:
          <select id="bcRate" style="padding:3px 7px;border-radius:6px;border:none;background:rgba(255,255,255,.2);color:#fff">
            <option value="0.8">慢</option>
            <option value="1" selected>正常</option>
            <option value="1.3">快</option>
          </select>
          音量:
          <select id="bcVolume" style="padding:3px 7px;border-radius:6px;border:none;background:rgba(255,255,255,.2);color:#fff">
            <option value="0.4">低</option>
            <option value="0.7">中</option>
            <option value="1" selected>高</option>
          </select>
        </div>
      </div>
      <div class="bc-controls">
        <button class="bc-btn" onclick="stopBroadcast_()" title="停止"><i class="fas fa-stop"></i></button>
        <button class="bc-btn play" onclick="pauseResumeBroadcast()"><i class="fas fa-pause" id="pauseIcon"></i></button>
        <button class="bc-btn" onclick="prevBroadcast()" title="上一条"><i class="fas fa-step-backward"></i></button>
        <button class="bc-btn" onclick="nextBroadcast()" title="下一条"><i class="fas fa-step-forward"></i></button>
      </div>
      <div class="bc-progress"><div class="bc-fill" id="bcFill"></div></div>
      <div class="bc-status"><i class="fas fa-info-circle"></i><span id="bcStatus">准备播报…</span></div>
    </div>

    <p style="font-size:.84rem;color:#888;margin-bottom:12px">
      <i class="fas fa-lightbulb"></i>
      提示：备忘录含"明天上午 9 点"等时间信息时，AI 会自动提取并加入行程
    </p>

    <div class="timeline" id="scheduleTimeline">
      <div class="no-schedule">
        <i class="fas fa-calendar-times"></i>
        <p>暂无行程</p>
        <p>添加含时间的备忘录后点击「生成行程」</p>
      </div>
    </div>
  </div>

</div><!-- /container -->

<div class="toast" id="toast"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
